# Default ROS 2 parameters for percision_sim nodes

sim_vision_node:
  ros__parameters:
    # 来源真值话题以及输出话题
    input_topic: "/sim/ground_truth"
    detection_topic: "/vision/detections"
    marker_topic: "/vision/markers"
    # 坐标与类别配置
    frame_id: "base_link"
    camera_id: "front"
    camera_yaw: 0.0
    class_name: "ship"
    class_id: 1
    # 视场及噪声建模
    fov_half_angle: 0.78539816339  # 45deg
    sigma_angle: 0.02
    distance_noise_offset: 0.05
    distance_noise_scale: 0.0005
    publish_rate_hz: 0.0
    # 识别输出相对图像采集的随机延迟（秒），均匀分布
    detection_latency_min_sec: 0.030
    detection_latency_max_sec: 0.050
    vision_focal_length_px: 800.0   # 与融合节点占位参数对齐，用于 pixel_width 仿真

sim_ais_node:
  ros__parameters:
    input_topic: "/sim/ground_truth"
    ais_topic: "/ais/tracks"
    marker_topic: "/ais/markers"
    delay_sec: 3.0
    timer_period: 0.2
    ship_name_prefix: "AIS-"
    frame_id: "base_link"
    queue_max: 300
    text_height: 1.5

sim_nav_radar_node:
  ros__parameters:
    input_topic: "/sim/ground_truth"
    target_topic: "/nav_radar/targets"
    marker_topic: "/nav_radar/markers"
    frame_id: "base_link"
    min_period: 1.0
    noise_std: 5.0
    area_jitter: 0.1
    marker_height: 0.1

sim_mmwave_node:
  ros__parameters:
    input_topic: "/sim/ground_truth"
    target_topic: "/mmwave/targets"
    marker_topic: "/mmwave/markers"
    frame_id: "base_link"
    radar_id: "mmwave_front"
    radar_yaw: 0.0
    fov_half_angle: 1.0471975512  # 120deg total FoV
    radial_noise_std: 0.5
    angle_noise_deg: 0.1
    velocity_resolution_m_s: 0.1
    size_jitter: 0.2
    motion_speed_threshold_m_s: 0.3
    publish_rate_hz: 15.0
