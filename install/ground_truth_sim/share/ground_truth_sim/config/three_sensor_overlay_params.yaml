# FoV sector overlays aligned with three_vision_one_mmwave_params.yaml.
# RViz: MarkerArray → /sim/range_overlay_markers, Fixed Frame: base_link

range_overlay_node:
  ros__parameters:
    marker_topic: "/sim/range_overlay_markers"
    publish_hz: 1.0
    frame_id: "base_link"
    z_height: 0.08
    line_width: 0.25
    circle_segments: 96
    sector_arc_segments: 48

    show_gt_annulus: true
    gt_annulus_radius_min: 50.0
    gt_annulus_radius_max: 200.0

    show_vision_sector: true
    vision_yaws: [0.0, -0.7853981634, 0.7853981634]
    vision_fov_half_angles: [0.5235987756, 0.5235987756, 0.5235987756]
    vision_range_min: 1.0
    vision_range_max: 220.0

    show_mmwave_sector: true
    mmwave_yaws: [0.0]
    mmwave_fov_half_angles: [1.0471975512]
    mmwave_range_min: 1.0
    mmwave_range_max: 220.0
