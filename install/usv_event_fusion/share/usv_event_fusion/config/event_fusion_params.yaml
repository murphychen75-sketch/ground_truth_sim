# 单文件合并版（与 event_fusion_io + event_fusion_algorithm 等价）
# 推荐分别维护上述两个文件；参数说明见各拆分文件中的中文注释
event_fusion_node:
  ros__parameters:

    vision_topics:  # 视觉检测数组话题列表
      - "/vision/detections"
    vision_camera_ids:  # 相机标识，与 vision_topics 等长
      - "front"
    vision_camera_yaws:  # 各相机光轴相对船体 x 轴偏航 [rad]
      - 0.0
    vision_camera_mount_x:  # 各相机安装位置 x [m]
      - 0.0
    vision_camera_mount_y:  # 各相机安装位置 y [m]
      - 0.0
    default_camera_yaw_rad: 0.0  # 相机偏航缺省 [rad]
    default_camera_mount_x_m: 0.0  # 相机安装 x 缺省 [m]
    default_camera_mount_y_m: 0.0  # 相机安装 y 缺省 [m]
    vision_focal_length_px: 800.0  # 针孔焦距 [px]
    mmwave_topic: "/mmwave/targets"  # 毫米波目标话题
    default_radar_mount_yaw_rad: 0.0  # 雷达安装偏航 [rad]
    default_radar_mount_x_m: 0.0  # 雷达安装 x [m]
    default_radar_mount_y_m: 0.0  # 雷达安装 y [m]
    output_frame_id: "base_link"  # 输出坐标系
    fusion_snapshot_topic: "/fusion/snapshot"  # 场景快照
    fusion_catalog_topic: "/fusion/catalog"  # 目标档案
    fusion_tracks_topic: "/fusion/tracks"  # 旧版航迹数组
    fusion_markers_topic: "/fusion/track_markers"  # RViz 轨迹
    publish_legacy_global_track: false  # 是否发布旧版航迹话题
    catalog_publish_hz: 1.0  # 档案发布频率 [Hz]
    track_publish_hz: 20.0  # RViz 轨迹固定发布频率 [Hz]；融合计算仍随传感器回调。0=每回调更新
    max_history_points_per_track: 2000  # RViz 历史点数上限

    promotion_min_hits: 3  # 晋升所需成功关联次数
    coast_timeout_sec: 3.0  # 快照发布 coast 超时 [s]
    track_predict_stop_sec: 2.5  # 内部航迹删除超时 [s]
    max_internal_tracks: 12  # 内部航迹上限
    spawn_suppression_radius_m: 15.0  # 抑制新生航迹的邻域半径 [m]（0=关闭）
    process_noise_pos: 0.05  # 位置过程噪声
    process_noise_vel: 0.5  # 速度过程噪声
    vision_sigma_range_m: 2.0  # 视觉距离测量标准差 [m]
    vision_sigma_bearing_rad: 0.05  # 视觉方位标准差 [rad]
    vision_confidence_sigma_scale: 0.5  # 置信度噪声缩放
    position_std_radar_m: 1.5  # 雷达位置标准差 [m]
    velocity_std_radar_m_s: 0.5  # 雷达速度标准差 [m/s]
    radar_static_vel_inflate: 3.0  # 静止目标速度方差放大
    chi2_gate_vision: 5.991  # 视觉马氏门限（约 95%）
    chi2_gate_radar: 9.488  # 雷达马氏门限（约 95%）
    width_gate_sigma: 2.0  # 宽度门控 sigma 倍数
    association_width_weight: 1.5  # 宽度代价权重
    width_meas_std_radar_m: 0.5  # 雷达测量宽度标准差 [m]
    width_track_std_m: 0.3  # 雷达航迹宽度标准差 [m]
    width_meas_std_vision_px: 12.0  # 视觉测量像素宽度标准差 [px]
    width_track_std_vision_px: 8.0  # 视觉航迹像素宽度标准差 [px]
    profile_size_lpf_alpha: 0.35  # 尺寸低通 alpha
    size_update_ref_distance_m: 50.0  # 尺寸更新参考距离 [m]
    size_update_min_weight: 0.1  # 远距离尺寸更新最小权重
    class_history_len: 10  # 类别投票历史长度
    class_match_min_confidence: 0.6  # 类别硬门控最低置信度
