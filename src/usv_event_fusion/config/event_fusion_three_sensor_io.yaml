# event_fusion_node I/O for 3× vision + 1× front mmwave (150° symmetric vision stack).
# Algorithm params: event_fusion_algorithm.yaml
event_fusion_node:
  ros__parameters:

    vision_topics:
      - "/vision/front/detections"
      - "/vision/left/detections"
      - "/vision/right/detections"
    vision_camera_ids:
      - "front"
      - "left"
      - "right"
    vision_camera_yaws:
      - 0.0
      - -0.7853981634
      - 0.7853981634
    vision_camera_mount_x:
      - 0.25
      - 0.0
      - 0.0
    vision_camera_mount_y:
      - 0.0
      - 0.25
      - -0.25
    default_camera_yaw_rad: 0.0
    default_camera_mount_x_m: 0.0
    default_camera_mount_y_m: 0.0
    vision_focal_length_px: 800.0

    mmwave_topic: "/mmwave/front/targets"
    default_radar_mount_yaw_rad: 0.0
    default_radar_mount_x_m: 0.25
    default_radar_mount_y_m: 0.0

    output_frame_id: "base_link"
    fusion_snapshot_topic: "/fusion/snapshot"
    fusion_catalog_topic: "/fusion/catalog"
    fusion_tracks_topic: "/fusion/tracks"
    fusion_markers_topic: "/fusion/track_markers"
    publish_legacy_global_track: false
    catalog_publish_hz: 1.0
    track_publish_hz: 20.0  # RViz 轨迹固定发布 [Hz]；0=随传感器回调
    max_history_points_per_track: 2000
