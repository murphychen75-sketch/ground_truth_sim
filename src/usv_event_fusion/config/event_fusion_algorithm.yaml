# event_fusion_node — 融合算法参数（滤波协方差、门控、关联、航迹逻辑）
# 话题与外参见 event_fusion_io.yaml
event_fusion_node:
  ros__parameters:

    promotion_min_hits: 3  # 暂态航迹晋升为已确认所需连续成功关联次数
    coast_timeout_sec: 3.0  # 已确认航迹超过此时间无滤波更新则不写入快照发布
    track_predict_stop_sec: 2.5  # 内部航迹超过此时间无滤波更新则从表中删除
    max_internal_tracks: 12  # 内部航迹表最大条数，超出后不再新生航迹
    spawn_suppression_radius_m: 15.0  # 量测距现有航迹小于此值 [m] 时抑制新生（0=关闭）

    process_noise_pos: 0.05  # CV 模型位置过程噪声强度（白加速度近似）
    process_noise_vel: 0.5  # CV 模型速度过程噪声强度

    vision_sigma_range_m: 2.0  # 视觉距离测量标准差基准 [m]（置信度会缩放）
    vision_sigma_bearing_rad: 0.05  # 视觉方位测量标准差基准 [rad]
    vision_confidence_sigma_scale: 0.5  # 置信度越低时测量噪声放大系数

    position_std_radar_m: 1.5  # 毫米波平面位置测量标准差 [m]
    velocity_std_radar_m_s: 0.5  # 毫米波速度测量标准差 [m/s]
    radar_static_vel_inflate: 3.0  # 静止目标（objmotion_status=0）速度标准差放大倍数

    chi2_gate_vision: 5.991  # 视觉运动学马氏门限（2 维，约 95%）
    chi2_gate_radar: 9.488  # 雷达运动学马氏门限（4 维，约 95%）
    width_gate_sigma: 2.0  # 宽度差门控倍数（相对合并标准差）

    association_width_weight: 1.5  # 关联代价中宽度惩罚项相对运动学项的权重
    width_meas_std_radar_m: 0.5  # 雷达关联时测量宽度标准差 [m]
    width_track_std_m: 0.3  # 雷达关联时航迹估计宽度标准差 [m]
    width_meas_std_vision_px: 12.0  # 视觉关联时测量像素宽度标准差 [px]
    width_track_std_vision_px: 8.0  # 视觉关联时航迹投影像素宽度标准差 [px]

    profile_size_lpf_alpha: 0.35  # B 态尺寸低通滤波基础 alpha（近处会按距离放大）
    size_update_ref_distance_m: 50.0  # 尺寸更新距离加权参考距离 [m]
    size_update_min_weight: 0.1  # 远距离目标尺寸更新最小权重

    class_history_len: 10  # 类别投票历史长度（帧数）
    class_match_min_confidence: 0.6  # 航迹主导类别置信度高于此值才启用类别硬门控
    association_diag_hz: 1.0  # 关联诊断日志频率 [Hz]，0 关闭

    enable_track_merge: true  # 是否启用 tracker-tracker 重叠合并
    merge_center_distance_m: 10.0  # 重叠合并中心距门限 [m]
    merge_use_kin_gate: true  # 合并时是否启用 4D 马氏门
    merge_kin_chi2_gate: 9.488  # 合并运动学马氏门限（默认同 chi2_gate_radar）
